<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Sahaya</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" />
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Header Navbar -->
    <header class="navbar">
        <div class="nav-logo">
            <div class="logo-icon-small">
                <span class="material-symbols-rounded bell">notifications</span>
                <span class="material-symbols-rounded pin fill-icon">location_on</span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">How It Works</a>
            <a href="#">FAQ</a>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="login-container">
        <!-- Background decorative elements -->
        <div class="bg-pattern left-pattern"></div>
        <div class="bg-illustration right-illustration"></div>

        <!-- Centered Login Card -->
        <div class="login-card">
            
            <!-- Circular Logo -->
            <div class="logo-wrapper">
                <svg viewBox="0 0 200 200" class="circular-text">
                    <path id="circlePath" d="M 100, 100 m -70, 0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0" fill="transparent" />
                    <!-- Using two paths for top/bottom text to make it readable -->
                    <path id="topCurve" d="M 30 100 A 70 70 0 0 1 170 100" fill="transparent" />
                    <path id="bottomCurve" d="M 170 100 A 70 70 0 0 1 30 100" fill="transparent" />
                    <text font-weight="700" font-size="22" fill="#1D3E5E" letter-spacing="3">
                        <textPath href="#topCurve" startOffset="50%" text-anchor="middle">SAHAYA</textPath>
                    </text>
                    <text font-weight="700" font-size="16" fill="#1D3E5E" letter-spacing="2">
                        <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">LOCAL COMPLAINT APP</textPath>
                    </text>
                </svg>
                
                <div class="center-icon">
                    <svg viewBox="0 0 100 100" class="bell-svg">
                        <path d="M50 20 C65 20 70 35 70 50 L75 70 L25 70 L30 50 C30 35 35 20 50 20 Z" fill="#E2E8F0" stroke="#1D3E5E" stroke-width="3"/>
                        <path d="M40 70 A10 10 0 0 0 60 70" fill="none" stroke="#A8885B" stroke-width="3"/>
                        <line x1="20" y1="78" x2="80" y2="78" stroke="#A8885B" stroke-width="2" opacity="0.5"/>
                        <line x1="30" y1="84" x2="70" y2="84" stroke="#A8885B" stroke-width="2" opacity="0.5"/>
                    </svg>
                    <div class="pin-badge">
                        <span class="material-symbols-rounded fill-icon">location_on</span>
                    </div>
                </div>
            </div>

            <h2 style="text-align: center; margin-bottom: 20px; color: var(--navy-blue);">Reset Password</h2>
            <p style="text-align: center; margin-bottom: 24px; color: #6B7280; font-size: 14px; line-height: 1.5;">Enter your registered phone number or Aadhaar below to receive password reset instructions.</p>

            <!-- Reset Form -->
            <form class="login-form">
                
                <div class="input-group">
                    <span class="material-symbols-rounded input-icon">person</span>
                    <input type="text" placeholder="Enter Aadhaar or Phone Number" required>
                </div>

                <button type="submit" class="btn-login" style="margin-top: 12px;" onclick="event.preventDefault(); alert('Reset link sent!'); window.location.href='index.html'">SEND RESET LINK</button>

                <div class="form-links">
                    <p class="signup-text">Remember your password? <a href="index.html" class="signup-link">Sign In</a></p>
                </div>

            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="login-footer">
        <p class="copyright">SAHAYA &copy; 2024</p>
        <div class="footer-links">
            <a href="#">Privacy Link</a>
            <span class="dot">&middot;</span>
            <a href="#">Privacy Links</a>
        </div>
    </footer>

</body>
</html>
